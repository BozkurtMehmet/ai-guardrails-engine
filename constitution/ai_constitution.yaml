# =============================================================================
# AI Constitutional Policy — v1.0
# =============================================================================
# A governance framework defining ethical, safety, and operational constraints
# for AI-assisted decision systems. This constitution ensures that AI outputs
# remain fair, explainable, accountable, and aligned with regulatory and
# organizational standards.
# =============================================================================

version: "1.0"
name: AI Constitutional Policy
description: >
  A governance framework defining ethical, safety, and operational constraints
  for AI-assisted decision systems. This constitution ensures that AI outputs
  remain fair, explainable, accountable, and aligned with regulatory and
  organizational standards.

principles:

  fairness:
    title: Non-Discrimination
    description: >
      AI systems must not produce decisions that discriminate against individuals
      or groups based on protected attributes.
    protected_attributes:
      - race
      - gender
      - religion
      - nationality
      - disability
      - age
    enforcement:
      rule: reject_if_bias_detected
      severity: critical

  explainability:
    title: Decision Transparency
    description: >
      All AI-generated decisions must include a clear and human-understandable
      explanation describing the reasoning process and factors influencing
      the outcome.
    requirements:
      minimum_reasoning_length: 25
      required_fields:
        - reasoning
        - confidence
        - risk_score
    enforcement:
      rule: require_explanation
      severity: high

  safety:
    title: Harm Prevention
    description: >
      AI must avoid decisions that may cause significant financial,
      operational, or personal harm when uncertainty is high.
    enforcement:
      rule: escalate_if_high_risk
      thresholds:
        max_risk_score: 0.85
        max_uncertainty: 0.6
      action: human_review
      severity: high

  accountability:
    title: Decision Accountability
    description: >
      All AI decisions must be traceable, logged, and auditable.
    requirements:
      audit_log_required: true
      store_inputs: true
      store_outputs: true
      store_triggered_guardrails: true
    enforcement:
      rule: enforce_audit_logging
      severity: high

  security:
    title: Manipulation Resistance
    description: >
      AI systems must resist attempts to manipulate or bypass safeguards,
      including prompt injection and adversarial instructions.
    enforcement:
      rule: detect_prompt_injection
      action: reject
      severity: critical

  regulatory_compliance:
    title: Legal and Regulatory Compliance
    description: >
      AI decisions must comply with applicable financial, privacy, and
      data protection regulations.
    regulations:
      - GDPR
      - Financial Conduct Guidelines
      - Responsible AI standards
    enforcement:
      rule: block_if_regulation_violation
      severity: critical

  uncertainty_management:
    title: Uncertainty Escalation
    description: >
      When the AI system is uncertain about its recommendation,
      the decision must be escalated to a human reviewer.
    thresholds:
      min_confidence: 0.45
    enforcement:
      rule: escalate_if_low_confidence
      action: human_review
      severity: medium

  proportionality:
    title: Proportional Decision Making
    description: >
      AI systems must ensure that decisions are proportional to the
      level of risk and available evidence.
    enforcement:
      rule: require_evidence_based_decision
      severity: medium

  human_oversight:
    title: Human-in-the-Loop
    description: >
      Critical or high-risk decisions must involve human oversight.
    conditions:
      - risk_score_above_threshold
      - fairness_violation_detected
      - regulatory_uncertainty
    action: human_review
    severity: high

  robustness:
    title: Robustness Against Edge Cases
    description: >
      AI systems must handle unexpected or adversarial inputs safely.
    enforcement:
      rule: trigger_failure_playground_tests
      severity: medium

  transparency:
    title: System Transparency
    description: >
      System behavior, policies, and guardrails must be clearly documented
      and accessible for inspection.
    requirements:
      publish_policy: true
      version_controlled_policies: true
    enforcement:
      rule: enforce_policy_visibility
      severity: low

governance:

  policy_updates:
    description: >
      Changes to the AI constitution must be version-controlled and auditable.
    requirements:
      versioning: true
      changelog_required: true

  monitoring:
    description: >
      The system must continuously monitor guardrail triggers and
      decision outcomes.
    metrics:
      - guardrail_trigger_rate
      - rejected_decision_rate
      - human_review_rate

  incident_response:
    description: >
      If harmful or unsafe decisions are detected, the system must
      log the incident and escalate for investigation.
    action:
      - log_incident
      - notify_admin
